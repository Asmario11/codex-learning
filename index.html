<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card Tracker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        background: #f7f7f7;
      }

      h1 {
        margin-top: 0;
      }

      .actions {
        margin-bottom: 1rem;
      }

      button {
        padding: 0.5rem 0.9rem;
        margin-right: 0.5rem;
        border: 1px solid #aaa;
        background: white;
        cursor: pointer;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 0.6rem;
        text-align: left;
      }

      .checkbox-cell {
        width: 1%;
        text-align: center;
      }

      th {
        background: #efefef;
      }

      .empty {
        color: #666;
        text-align: center;
      }

      .cell-input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bbb;
        padding: 0.35rem 0.45rem;
      }
    </style>
  </head>
  <body>
    <h1>Credit Card Tracker</h1>

    <div class="actions">
      <button id="addCardBtn">Add Card</button>
      <button id="removeCardBtn">Remove Card</button>
    </div>

    <table>
      <thead>
        <tr>
          <th class="checkbox-cell">Select</th>
          <th>Card Name</th>
          <th>Limit</th>
          <th>Balance</th>
          <th>Payment Due Date</th>
        </tr>
      </thead>
      <tbody id="cardTableBody">
        <tr id="emptyRow">
          <td colspan="5" class="empty">No cards added yet.</td>
        </tr>
      </tbody>
    </table>

    <script>
      const addCardBtn = document.getElementById("addCardBtn");
      const removeCardBtn = document.getElementById("removeCardBtn");
      const cardTableBody = document.getElementById("cardTableBody");
      const STORAGE_KEY = "creditCardTracker.cards";

      function removeEmptyRow() {
        const emptyRow = document.getElementById("emptyRow");
        if (emptyRow) {
          emptyRow.remove();
        }
      }

      function addEmptyRowIfNeeded() {
        if (cardTableBody.children.length === 0) {
          const row = document.createElement("tr");
          row.id = "emptyRow";
          row.innerHTML = '<td colspan="5" class="empty">No cards added yet.</td>';
          cardTableBody.appendChild(row);
        }
      }

      function createInputCell(inputType, options = {}) {
        const cell = document.createElement("td");
        const input = document.createElement("input");

        input.className = "cell-input";
        input.type = inputType;

        if (options.placeholder) {
          input.placeholder = options.placeholder;
        }

        if (options.min !== undefined) {
          input.min = options.min;
        }

        if (options.step !== undefined) {
          input.step = options.step;
        }

        if (options.field) {
          input.dataset.field = options.field;
        }

        cell.appendChild(input);
        return cell;
      }

      function saveCardsToLocalStorage() {
        const rows = cardTableBody.querySelectorAll("tr:not(#emptyRow)");
        const cards = Array.from(rows).map((row) => {
          return {
            cardName: row.querySelector('input[data-field="cardName"]')?.value ?? "",
            limit: row.querySelector('input[data-field="limit"]')?.value ?? "",
            balance: row.querySelector('input[data-field="balance"]')?.value ?? "",
            paymentDueDate: row.querySelector('input[data-field="paymentDueDate"]')?.value ?? "",
          };
        });

        localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
      }

      function addCardRow(card = {}) {
        removeEmptyRow();

        const row = document.createElement("tr");
        const selectCell = document.createElement("td");
        const selectCheckbox = document.createElement("input");
        selectCell.className = "checkbox-cell";
        selectCheckbox.type = "checkbox";
        selectCheckbox.setAttribute("aria-label", "Select row");
        selectCell.appendChild(selectCheckbox);

        const cardNameCell = createInputCell("text", {
          placeholder: "Card Name",
          field: "cardName",
        });
        const limitCell = createInputCell("number", {
          placeholder: "Limit",
          min: "0",
          step: "0.01",
          field: "limit",
        });
        const balanceCell = createInputCell("number", {
          placeholder: "Balance",
          min: "0",
          step: "0.01",
          field: "balance",
        });
        const paymentDueDateCell = createInputCell("date", { field: "paymentDueDate" });

        cardNameCell.querySelector("input").value = card.cardName ?? "";
        limitCell.querySelector("input").value = card.limit ?? "";
        balanceCell.querySelector("input").value = card.balance ?? "";
        paymentDueDateCell.querySelector("input").value = card.paymentDueDate ?? "";

        row.appendChild(selectCell);
        row.appendChild(cardNameCell);
        row.appendChild(limitCell);
        row.appendChild(balanceCell);
        row.appendChild(paymentDueDateCell);
        cardTableBody.appendChild(row);
      }

      function loadCardsFromLocalStorage() {
        const savedCardsJson = localStorage.getItem(STORAGE_KEY);

        if (!savedCardsJson) {
          return;
        }

        let savedCards;

        try {
          savedCards = JSON.parse(savedCardsJson);
        } catch {
          return;
        }

        if (!Array.isArray(savedCards) || savedCards.length === 0) {
          return;
        }

        savedCards.forEach((card) => addCardRow(card));
      }

      addCardBtn.addEventListener("click", () => {
        addCardRow();
        saveCardsToLocalStorage();
      });

      removeCardBtn.addEventListener("click", () => {
        const rows = cardTableBody.querySelectorAll("tr:not(#emptyRow)");

        if (rows.length === 0) {
          return;
        }

        const selectedRows = Array.from(rows).filter((row) => {
          const checkbox = row.querySelector('input[type="checkbox"]');
          return checkbox?.checked;
        });

        if (selectedRows.length === 0) {
          return;
        }

        selectedRows.forEach((row) => row.remove());
        addEmptyRowIfNeeded();
        saveCardsToLocalStorage();
      });

      cardTableBody.addEventListener("input", (event) => {
        if (event.target.matches("input")) {
          saveCardsToLocalStorage();
        }
      });

      loadCardsFromLocalStorage();
    </script>
  </body>
</html>
