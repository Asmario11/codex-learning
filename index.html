<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card Tracker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        background: #f7f7f7;
      }

      h1 {
        margin-top: 0;
      }

      .actions {
        margin-bottom: 1rem;
      }

      button {
        padding: 0.5rem 0.9rem;
        margin-right: 0.5rem;
        border: 1px solid #aaa;
        background: white;
        cursor: pointer;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 0.6rem;
        text-align: left;
      }

      th {
        background: #efefef;
      }

      .empty {
        color: #666;
        text-align: center;
      }

      .cell-input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bbb;
        padding: 0.35rem 0.45rem;
      }
    </style>
  </head>
  <body>
    <h1>Credit Card Tracker</h1>

    <div class="actions">
      <button id="addCardBtn">Add Card</button>
      <button id="removeCardBtn">Remove Card</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Card Name</th>
          <th>Limit</th>
          <th>Balance</th>
          <th>Payment Due Date</th>
        </tr>
      </thead>
      <tbody id="cardTableBody">
        <tr id="emptyRow">
          <td colspan="4" class="empty">No cards added yet.</td>
        </tr>
      </tbody>
    </table>

    <script>
      const addCardBtn = document.getElementById("addCardBtn");
      const removeCardBtn = document.getElementById("removeCardBtn");
      const cardTableBody = document.getElementById("cardTableBody");

      function removeEmptyRow() {
        const emptyRow = document.getElementById("emptyRow");
        if (emptyRow) {
          emptyRow.remove();
        }
      }

      function addEmptyRowIfNeeded() {
        if (cardTableBody.children.length === 0) {
          const row = document.createElement("tr");
          row.id = "emptyRow";
          row.innerHTML = '<td colspan="4" class="empty">No cards added yet.</td>';
          cardTableBody.appendChild(row);
        }
      }

      addCardBtn.addEventListener("click", () => {
        removeEmptyRow();

        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input class="cell-input" type="text" placeholder="Card Name" /></td>
          <td><input class="cell-input" type="number" min="0" step="0.01" placeholder="Limit" /></td>
          <td><input class="cell-input" type="number" min="0" step="0.01" placeholder="Balance" /></td>
          <td><input class="cell-input" type="date" /></td>
        `;
        cardTableBody.appendChild(row);
      });

      removeCardBtn.addEventListener("click", () => {
        const rows = cardTableBody.querySelectorAll("tr");

        if (rows.length === 0 || (rows.length === 1 && rows[0].id === "emptyRow")) {
          return;
        }

        const lastRow = rows[rows.length - 1];
        lastRow.remove();
        addEmptyRowIfNeeded();
      });
    </script>
  </body>
</html>
